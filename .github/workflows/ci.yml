name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff bandit
      - run: ruff check src/ tests/
      - run: bandit -r src/ -ll

  test:
    name: Tests & CVE Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-layer2.txt
      - name: pytest
        run: pytest tests/ -v --cov=src --cov-report=xml
      - name: pip-audit
        # Audit the installed environment — avoids build-from-source failures on sdist-only packages
        run: pip-audit
      - uses: codecov/codecov-action@v3
        with:
          file: coverage.xml
          fail_ci_if_error: false
